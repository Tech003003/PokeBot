name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Yarn
        run: corepack enable

      - name: Build React frontend
        working-directory: frontend
        run: |
          yarn install --frozen-lockfile
          yarn build

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pyinstaller==6.6.0

      - name: Install Playwright Chromium (into repo folder so it bundles)
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}\ms-playwright
        run: python -m playwright install chromium

      - name: Build with PyInstaller
        run: pyinstaller build_exe.spec --clean --noconfirm

      - name: Copy README + Start-Brave helper into build
        shell: pwsh
        run: |
          Copy-Item README.md dist/TechBot/README.md
          Copy-Item local/Start-Brave.bat dist/TechBot/Start-Brave.bat
          Copy-Item local/README.md dist/TechBot/Detailed-Guide.md -ErrorAction SilentlyContinue

      - name: Zip the build
        shell: pwsh
        run: Compress-Archive -Path dist/TechBot/* -DestinationPath TechBot-windows.zip -Force

      - name: Upload build artifact (every run)
        uses: actions/upload-artifact@v4
        with:
          name: TechBot-windows
          path: TechBot-windows.zip
          retention-days: 30

      - name: Create GitHub Release (only on version tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: TechBot-windows.zip
          generate_release_notes: true
          body: |
            ## TechBot ${{ github.ref_name }}

            **Windows users:** download `TechBot-windows.zip` below, extract it anywhere,
            and double-click `TechBot.exe`. No Python, Node, or any dev tools required —
            just install [Brave browser](https://brave.com/download) first.

            See `README.md` inside the ZIP for full setup instructions.
